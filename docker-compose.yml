services:
  app:
    build:
      context: .
    container_name: laravel-app
    volumes:
      - .:/var/www
    working_dir: /var/www
    networks:
      - laravel
    depends_on:
      - db
      - clustering-api

  web:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  db:
    image: mariadb:10.4
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sispi
      MYSQL_USER: sispi
      MYSQL_PASSWORD: sispi
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel

  clustering-api:
    build:
      context: ../clustering-API
    container_name: clustering-api
    ports:
      - "8001:8001"
    networks:
      - laravel

networks:
  laravel:

volumes:
  db_data:
